name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  typecheck-lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npx next lint
      - run: npx next build
        env:
          SITE_URL: https://sidebystar.com
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 3

  link-check:
    runs-on: ubuntu-latest
    needs: typecheck-lint-build
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --exclude beian.miit.gov.cn --exclude beian.mps.gov.cn --exclude localhost --exclude 127.0.0.1 './content/**/*.{ts,tsx,json}' './app/**/*.{ts,tsx,mdx}' './components/**/*.{ts,tsx}' './messages/*.json'
          fail: false

  a11y:
    runs-on: ubuntu-latest
    needs: typecheck-lint-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx next build
        env:
          SITE_URL: http://localhost:3000
      - name: Start server
        run: npx next start &
      - name: Wait for server
        run: npx wait-on http://localhost:3000/zh-CN -t 30000
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/zh-CN
            http://localhost:3000/zh-CN/solutions
            http://localhost:3000/zh-CN/products
            http://localhost:3000/zh-CN/research
            http://localhost:3000/en
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouse.json
